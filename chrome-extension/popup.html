<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
    }
    .header {
      background: #1e3a5f;
      color: white;
      padding: 16px;
      text-align: center;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 4px; }
    .content { padding: 16px; }
    #analyze-btn {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    #analyze-btn:hover { background: #1d4ed8; }
    #analyze-btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .spinner {
      display: none;
      text-align: center;
      padding: 24px;
    }
    .spinner.active { display: block; }
    .spinner::after {
      content: '';
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result { display: none; margin-top: 16px; }
    .result.active { display: block; }
    .badge {
      text-align: center;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .badge.fake { background: #fef2f2; border: 2px solid #fecaca; }
    .badge.real { background: #f0fdf4; border: 2px solid #bbf7d0; }
    .badge-label {
      font-size: 24px;
      font-weight: 700;
    }
    .badge.fake .badge-label { color: #dc2626; }
    .badge.real .badge-label { color: #16a34a; }
    .confidence {
      font-size: 13px;
      margin-top: 4px;
    }
    .badge.fake .confidence { color: #991b1b; }
    .badge.real .confidence { color: #166534; }
    .words { margin-top: 12px; }
    .words h3 { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
    .word-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 12px;
    }
    .word-name { font-weight: 500; }
    .word-weight { font-family: monospace; font-size: 11px; }
    .word-weight.positive { color: #dc2626; }
    .word-weight.negative { color: #16a34a; }
    .error {
      display: none;
      background: #fef2f2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 12px;
    }
    .error.active { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Fake News Detector</h1>
    <p>AI-powered news verification</p>
  </div>
  <div class="content">
    <button id="analyze-btn">Analyze This Page</button>
    <div id="spinner" class="spinner"></div>
    <div id="error" class="error"></div>
    <div id="result" class="result">
      <div id="badge" class="badge">
        <div id="badge-label" class="badge-label"></div>
        <div id="confidence" class="confidence"></div>
      </div>
      <div class="words">
        <h3>KEY WORDS</h3>
        <div id="words-list"></div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
